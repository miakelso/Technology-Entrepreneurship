<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch the Falling Stars ⭐</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      text-align: center;
    }

    canvas {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    #scoreBoard {
      margin-bottom: 10px;
      font-size: 20px;
    }

    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px 30px;
      border-radius: 12px;
      display: none;
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="gameOver">
      <div id="finalScore"></div>
      <button onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");

    let basket = {
      x: canvas.width / 2 - 40,
      y: canvas.height - 40,
      width: 80,
      height: 20,
      speed: 7
    };

    let stars = [];
    let score = 0;
    let gameRunning = true;

    function drawBasket() {
      ctx.fillStyle = "#ffcc00";
      ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
    }

    function drawStar(star) {
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(star.x, star.y, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    function createStar() {
      const x = Math.random() * (canvas.width - 16) + 8;
      stars.push({ x: x, y: -10, speed: 2 + Math.random() * 3 });
    }

    function updateStars() {
      for (let i = 0; i < stars.length; i++) {
        stars[i].y += stars[i].speed;

        // Catch
        if (
          stars[i].y + 8 > basket.y &&
          stars[i].x > basket.x &&
          stars[i].x < basket.x + basket.width
        ) {
          stars.splice(i, 1);
          score++;
          scoreEl.textContent = score;
          i--;
        }
        // Miss
        else if (stars[i].y > canvas.height) {
          gameOver();
        }
      }
    }

    function gameOver() {
      gameRunning = false;
      finalScoreEl.textContent = "Game Over! Final Score: " + score;
      gameOverEl.style.display = "block";
    }

    function restartGame() {
      stars = [];
      score = 0;
      scoreEl.textContent = score;
      gameRunning = true;
      gameOverEl.style.display = "none";
      animate();
    }

    function animate() {
      if (!gameRunning) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBasket();
      updateStars();
      stars.forEach(drawStar);

      requestAnimationFrame(animate);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && basket.x > 0) {
        basket.x -= basket.speed;
      } else if (
        e.key === "ArrowRight" &&
        basket.x + basket.width < canvas.width
      ) {
        basket.x += basket.speed;
      }
    });

    setInterval(() => {
      if (gameRunning) createStar();
    }, 1000);

    animate();
  </script>
</body>
</html>
